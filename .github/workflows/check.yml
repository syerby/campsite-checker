name: Check Green River Reservoir

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM EDT (UTC-4)
  workflow_dispatch:       # lets you trigger a test run manually from GitHub

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run availability check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python check_greenriver.py

      - name: Save state back to repo
        run: |
          git config user.name  "campsite-bot"
          git config user.email "action@github.com"

          # Capture the state the script just wrote
          STATE=$(cat last_alerted.json)

          # Reset to whatever is on the remote right now (avoids any push conflicts)
          git fetch origin main
          git reset --hard origin/main

          # Restore the state and commit if it changed
          echo "$STATE" > last_alerted.json
          git add last_alerted.json
          git diff --staged --quiet && echo "No state changes" || git commit -m "chore: update availability state"
          git push origin main

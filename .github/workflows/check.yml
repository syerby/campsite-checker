name: Check Green River Reservoir

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM EDT (UTC-4)
  workflow_dispatch:       # lets you trigger a test run manually from GitHub

permissions:
  contents: write          # needed to commit the state file back

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run availability check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python check_greenriver.py

      - name: Save state back to repo
        run: |
          git config user.name  "campsite-bot"
          git config user.email "action@github.com"
          git add --force last_alerted.json || true
          git diff --staged --quiet && echo "No state changes to commit" || git commit -m "chore: update availability state"
          git push || echo "Nothing to push"

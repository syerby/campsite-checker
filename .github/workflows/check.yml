name: Check Green River Reservoir

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM EDT (UTC-4)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Show script version
        run: grep "Available windows\|New availability\|def get_available_sites" check_greenriver.py

      - name: Run availability check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python check_greenriver.py
